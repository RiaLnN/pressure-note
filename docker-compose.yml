version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: healthflow_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-healthflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env
  api:
    build: .
    container_name: healthflow_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  bot:
    build: .
    container_name: healthflow_bot
    restart: always
    env_file:
      - .env
    depends_on:
      - db
    command: python -m app.bot.main
volumes:
  postgres_data: